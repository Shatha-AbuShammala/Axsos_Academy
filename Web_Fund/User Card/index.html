<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <div class="banner"></div>
    <img class="user" src="./images/icons/user-circle.png" alt="user" />

    <div class="info">
      <h2>Jane Doe</h2>

      <div class="location">
        <img src="./images/icons/map-marker.png" alt="location" class="icon" />
        <p>Seattle</p>
      </div>

      <p class="bio">Developer | Engineer | Problem Solver<br>Master of shadows and the Internet!</p>

      <div class="edit">
        <img src="./images/icons/gear.png" alt="gear" class="icon" />
        <a href="#">edit profile</a>
      </div>
    </div>
  </div>

</body>
</html>
