<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octodex Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="row row1">
            <img class="octocat" src="./images/img1.png" alt="img1">
            <img class="octocat" src="./images/img2.png" alt="img2">
            <img class="octocat" src="./images/img3.png" alt="img3">
        </div>
        <div class="row row2">
            <img class="octocat" src="./images/img4.png" alt="img4">
            <img class="octocat" src="./images/img5.jpg" alt="img5">
        </div>
        <div class="row row3">
            <img class="octocat" src="./images/img6.png" alt="img6">
            <img class="octocat" src="./images/img7.jpg" alt="img7">
            <img class="octocat" src="./images/img8.jpg" alt="img8">
        </div>
            <p class="footer">Images from<a href="https://octodex.github.com/">GitHub Octodex</a></p>

    </div>

</body>
</html>
