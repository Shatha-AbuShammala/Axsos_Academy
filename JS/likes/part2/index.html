<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Likes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <div class="navbar">Network</div>
 
  <h2 class="feed-title">Your Feed</h2>
 
  <div class="wrapper">
 
    <div class="profile">
      <img src="images/adrien-s.jpg" alt="user" class="avatar" />
      <a href="#">Add an avatar</a>
      <p>James Doe</p>
    </div>
 
    <div class="posts">
 
      <div class="post">
        <div class="post-top">
          <h3>Neil M</h3>
          <span id="count1">9</span> like(s)
          <button onclick="addLike('count1')">Like</button>
        </div>
        <p>I just set up this new discord bot, let me know what you all think. <a href="#">link</a></p>
      </div>
 
      <div class="post">
        <div class="post-top">
          <h3>Nichole K</h3>
          <span id="count2">12</span> like(s)
          <button onclick="addLike('count2')">Like</button>
        </div>
        <p>Just finished my <a href="#">next comic</a>, check it out.</p>
      </div>
 
      <div class="post">
        <div class="post-top">
          <h3>Jim R</h3>
          <span id="count3">9</span> like(s)
          <button onclick="addLike('count3')">Like</button>
        </div>
        <p>I can't stop listening to the <a href="#">new album</a>. Who else is liking it?</p>
      </div>
 
    </div>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
